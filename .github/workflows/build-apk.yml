name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/upload-artifact@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Create project structure
        run: |
          mkdir -p app/src/main/java/com/khatynhrad
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/mipmap-mdpi
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p app/src/main/res/mipmap-xhdpi
          mkdir -p app/src/main/res/mipmap-xxhdpi
          mkdir -p app/src/main/res/mipmap-xxxhdpi
          mkdir -p app/src/main/assets
          mkdir -p gradle/wrapper

      - name: Copy game files
        run: |
          cp index.html app/src/main/assets/index.html
          [ -f manifest.json ] && cp manifest.json app/src/main/assets/ || true
          [ -f sw.js ] && cp sw.js app/src/main/assets/ || true

      - name: Generate icons
        run: |
          pip3 install Pillow -q
          python3 - << 'PYEOF'
          from PIL import Image, ImageDraw
          import os
          def icon(size):
              img = Image.new('RGBA',(size,size),(0,0,0,0))
              d = ImageDraw.Draw(img)
              r = size//6
              d.rounded_rectangle([0,0,size-1,size-1],radius=r,fill=(44,26,8))
              bw = max(2,size//48)
              d.rounded_rectangle([bw*2,bw*2,size-bw*2-1,size-bw*2-1],radius=r-bw,outline=(255,180,0),width=bw)
              cx,cy = size//2,size//2-size//14
              sr = size//2-size//9
              d.ellipse([cx-sr,cy-sr,cx+sr,cy+sr],fill=(74,184,255))
              d.rounded_rectangle([cx-sr,cy+sr//3,cx+sr,cy+sr],radius=4,fill=(78,158,53))
              hw,hh = size//3,size//4
              hx,hy = cx-hw//2,cy-hh//2
              d.rectangle([hx,hy+hh//3,hx+hw,hy+hh],fill=(100,70,180))
              d.polygon([(hx-hw//8,hy+hh//3),(cx,hy-hh//4),(hx+hw+hw//8,hy+hh//3)],fill=(200,80,50))
              dx = cx-(hw//4)//2
              d.rectangle([dx,hy+hh-hh//3,dx+hw//4,hy+hh],fill=(60,30,10))
              return img
          base='app/src/main/res'
          for f,s in [('mipmap-mdpi',48),('mipmap-hdpi',72),('mipmap-xhdpi',96),('mipmap-xxhdpi',144),('mipmap-xxxhdpi',192)]:
              icon(s).save(f'{base}/{f}/ic_launcher.png','PNG')
              print(f'OK {f} {s}px')
          PYEOF

      - name: Write AndroidManifest.xml
        run: |
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.khatynhrad">
            <uses-permission android:name="android.permission.INTERNET"/>
            <uses-permission android:name="android.permission.WAKE_LOCK"/>
            <application android:allowBackup="false" android:icon="@mipmap/ic_launcher"
              android:label="Khatynhrad" android:hardwareAccelerated="true"
              android:usesCleartextTraffic="true">
              <activity android:name=".MainActivity" android:exported="true"
                android:screenOrientation="landscape"
                android:configChanges="orientation|screenSize|keyboardHidden"
                android:windowSoftInputMode="adjustNothing">
                <intent-filter>
                  <action android:name="android.intent.action.MAIN"/>
                  <category android:name="android.intent.category.LAUNCHER"/>
                </intent-filter>
              </activity>
            </application>
          </manifest>
          EOF

      - name: Write MainActivity.java
        run: |
          cat > app/src/main/java/com/khatynhrad/MainActivity.java << 'EOF'
          package com.khatynhrad;
          import android.annotation.SuppressLint;
          import android.app.Activity;
          import android.content.pm.ActivityInfo;
          import android.os.Bundle;
          import android.view.View;
          import android.view.Window;
          import android.view.WindowManager;
          import android.webkit.*;
          public class MainActivity extends Activity {
              private WebView webView;
              @SuppressLint({"SetJavaScriptEnabled","SourceLockedOrientationActivity"})
              @Override
              protected void onCreate(Bundle s) {
                  super.onCreate(s);
                  requestWindowFeature(Window.FEATURE_NO_TITLE);
                  getWindow().setFlags(WindowManager.LayoutParams.FLAG_FULLSCREEN,WindowManager.LayoutParams.FLAG_FULLSCREEN);
                  getWindow().addFlags(WindowManager.LayoutParams.FLAG_KEEP_SCREEN_ON);
                  setRequestedOrientation(ActivityInfo.SCREEN_ORIENTATION_LANDSCAPE);
                  setContentView(R.layout.activity_main);
                  webView = findViewById(R.id.webview);
                  WebSettings ws = webView.getSettings();
                  ws.setJavaScriptEnabled(true);
                  ws.setAllowFileAccess(true);
                  ws.setAllowFileAccessFromFileURLs(true);
                  ws.setAllowUniversalAccessFromFileURLs(true);
                  ws.setDomStorageEnabled(true);
                  ws.setUseWideViewPort(true);
                  ws.setLoadWithOverviewMode(true);
                  ws.setSupportZoom(false);
                  webView.setLayerType(View.LAYER_TYPE_HARDWARE,null);
                  webView.setWebViewClient(new WebViewClient());
                  webView.setWebChromeClient(new WebChromeClient());
                  webView.loadUrl("file:///android_asset/index.html");
                  hideUI();
              }
              private void hideUI() {
                  getWindow().getDecorView().setSystemUiVisibility(
                      View.SYSTEM_UI_FLAG_IMMERSIVE_STICKY|View.SYSTEM_UI_FLAG_FULLSCREEN|
                      View.SYSTEM_UI_FLAG_HIDE_NAVIGATION|View.SYSTEM_UI_FLAG_LAYOUT_STABLE|
                      View.SYSTEM_UI_FLAG_LAYOUT_FULLSCREEN|View.SYSTEM_UI_FLAG_LAYOUT_HIDE_NAVIGATION);
              }
              @Override public void onBackPressed(){if(webView.canGoBack())webView.goBack();}
              @Override protected void onResume(){super.onResume();hideUI();webView.onResume();}
              @Override protected void onPause(){super.onPause();webView.onPause();}
              @Override protected void onDestroy(){if(webView!=null)webView.destroy();super.onDestroy();}
          }
          EOF

      - name: Write layout
        run: |
          cat > app/src/main/res/layout/activity_main.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"
            android:layout_width="match_parent" android:layout_height="match_parent"
            android:background="#1a3a1a">
            <WebView android:id="@+id/webview"
              android:layout_width="match_parent" android:layout_height="match_parent"
              android:scrollbars="none"/>
          </RelativeLayout>
          EOF

      - name: Write resources
        run: |
          cat > app/src/main/res/values/styles.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
            <style name="AppTheme" parent="android:Theme.NoTitleBar.Fullscreen">
              <item name="android:windowBackground">#1a3a1a</item>
              <item name="android:windowFullscreen">true</item>
            </style>
          </resources>
          EOF
          cat > app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources><string name="app_name">Khatynhrad</string></resources>
          EOF

      - name: Write Gradle files
        run: |
          cat > app/build.gradle << 'EOF'
          apply plugin: 'com.android.application'
          android {
            compileSdkVersion 33
            defaultConfig {
              applicationId "com.khatynhrad"
              minSdkVersion 21
              targetSdkVersion 33
              versionCode 1
              versionName "1.0"
            }
            buildTypes {
              debug { debuggable true }
              release { minifyEnabled false }
            }
            compileOptions {
              sourceCompatibility JavaVersion.VERSION_1_8
              targetCompatibility JavaVersion.VERSION_1_8
            }
          }
          EOF
          cat > build.gradle << 'EOF'
          buildscript {
            repositories { google(); mavenCentral() }
            dependencies { classpath 'com.android.tools.build:gradle:7.4.2' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF
          echo "include ':app'" > settings.gradle
          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-7.5-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Build APK
        run: |
          gradle assembleDebug --no-daemon
        env:
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: Khatynhrad-APK
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
